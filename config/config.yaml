# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                     Version: 2.2.0
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  # 时区配置（影响所有时间显示、调度系统判断、数据存储）
  # 常用时区：
  #    - Asia/Shanghai (北京时间 UTC+8)
  #    - America/New_York (美东时间 UTC-5/-4)
  #    - Europe/London (伦敦时间 UTC+0/+1)
  # 完整时区列表: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  timezone: "Asia/Shanghai"
  show_version_update: true           # 显示版本更新提示


# ===============================================================
# 1.5 调度系统 —— 什么时间做什么事
#
# 通过 timeline.yaml 里定义的时间段来自动决定：
#    - 什么时候推送通知
#    - 什么时候做 AI 分析
#    - 用什么报告模式
#
# 快速上手：选一个预设模板，改 preset 的值就行
#
#   always_on       → 全天候，有新增即推送
#   morning_evening → 全天推送 + 晚间当日汇总（推荐）
#   office_hours    → 工作日三段式（到岗→午间→收工），周末增量自由推
#   night_owl       → 午后速览 + 深夜全天汇总
#   custom          → 完全自定义，详见 timeline.yaml
#
# 详细时间线图请查看 config/timeline.yaml
# ===============================================================
schedule:
  enabled: true                         # 是否启用调度系统
  preset: "morning_evening"             # 预设模板名称（见上方说明）


# ===============================================================
# 2. 数据源 - 热榜平台
#
# enabled: 是否启用热榜抓取（总开关）
# sources: 平台列表
#    - id: 平台唯一标识（勿修改）
#    - name: 显示名称（可自定义，修改后不影响运行）
# ===============================================================
platforms:
  enabled: true                         # 是否启用热榜平台抓取
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"



# ===============================================================
# 3. 数据源 - RSS 订阅
#
# 与热榜数据分开存储，按时间流展示
# 每个源配置：id(唯一标识)、name(显示名称)、url(订阅地址)
# enabled: 可选，默认 true
# max_age_days: 可选，覆盖全局 freshness_filter.max_age_days
# ===============================================================
rss:
  enabled: true                       # 是否启用 RSS 抓取

  # 文章新鲜度过滤配置（全局默认值）
  # 过滤掉发布时间超过指定天数的旧文章，避免同一篇文章重复出现在推送中
  #
  # 过滤逻辑：
  #    - 文章发布时间距当前时间（app.timezone 时区）超过 N 天则不推送
  #    - 无发布时间的文章会被保留（不过滤）
  #
  # ⚠️ 过滤时机：在推送阶段过滤
  #    - 所有文章都会存入数据库（MCP Server 的 AI 查询仍可访问）
  #    - 只有新鲜的文章会被推送到通知渠道
  freshness_filter:
    enabled: true                     # 是否启用新鲜度过滤（默认启用）

    max_age_days: 1                   # 最大文章年龄（天）
                                      # - 正整数：只推送 N 天内的文章
                                      # - 0：禁用过滤，推送所有文章

  # 单个 feed 可配置 max_age_days 覆盖全局设置：
  # - 不配置：使用全局 freshness_filter.max_age_days（默认 3 天）
  # - 正整数：覆盖全局设置，只推送此天数内的文章
  # - 0：禁用此频道的新鲜度过滤，推送所有文章
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"

    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      enabled: false                  # 禁用
      # max_age_days: 3                # 示例：推送 3 天内的文章（更新较慢的博客）
      
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"                     # daily | current | incremental（schedule 开启时作为默认值）

  display_mode: "keyword"             # 分组维度: keyword | platform

  sort_by_position_first: false

  rank_threshold: 5                   # 排名高亮阈值

  max_news_per_keyword: 0             # 每个关键词/标签最大显示数量


# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "ai"                     # 可选: keyword | ai

  priority_sort_enabled: true


# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200                         # 每批发送给 AI 的标题数
  batch_interval: 2                        # 分批处理时，每批之间的等待时间（秒）

  min_score: 0.7                          # 推送最低分数阈值（0.0 ~ 1.0）

  reclassify_threshold: 0.6

  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis

  regions:
    hotlist: true
    new_items: false

    rss: true

    standalone: false
    ai_analysis: true

  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true                       # 是否启用通知功能

  # 推送渠道配置
  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"

  formats:
    sqlite: true
    txt: false
    html: true

  local:
    data_dir: "output"
    retention_days: 0

  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""

  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置（共享）
# ===============================================================
ai:
  # 这里的 ${AI_API_KEY} 会自动读取你刚才在 Secrets 里填的内容
  api_key: "${AI_API_KEY}"
  # 2026年推荐使用 flash-lite 模型，速度极快且节省额度
  model: "gemini/gemini-1.5-flash" 
  # Google AI Studio 的标准接口地址
  api_base: "https://generativelanguage.googleapis.com"
  # 开启 AI 分析功能
  enable_analysis: true

  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true                     # 是否启用 AI 分析（总开关）

  language: "Chinese"

  prompt_file: "ai_analysis_prompt.txt"

  mode: "follow_report"

  max_news_for_analysis: 150

  include_rss: false
  
  include_standalone: true

  include_rank_timeline: true


# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true                    # 是否启用翻译功能

  language: "中文"

  prompt_file: "ai_translation_prompt.txt"

  scope:
    hotlist: false
    rss: true
    standalone: true


# ===============================================================
# 11. 高级设置（一般无需修改）
# ===============================================================
advanced:
  debug: false

  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3

  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
